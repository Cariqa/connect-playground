name: connect_reference_client
description: "Cariqa Connect Playground"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_stripe: 12.3.0
  flutter_stripe_web: 7.3.0
  google_maps_flutter: 2.17.0

  http: 1.6.0
  flutter_bloc: 9.1.1
  google_fonts: 8.0.2
  url_launcher: 6.3.2
  shared_preferences: 2.5.5
  easy_debounce: 2.0.3
  package_info_plus: 10.1.0

dev_dependencies:
  flutter_lints: 6.0.0

flutter:
  uses-material-design: true
  assets:
     - assets/logo_title.png
     - assets/map_icon.png
     - assets/cluster.png
     - assets/arrow-top-right.png
     - assets/magic_wand.png